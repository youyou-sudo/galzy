name: Build and Push WEB Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/web-tanstack/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/build-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mono-web

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Extract version
        id: version
        run: echo "value=$(node -p "require('./apps/api/package.json').version")" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web-tanstack/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger WEB Webhook Deploy
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_WEB }}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: registry_package" \
            --max-time 30 \
            --retry 2 \
            -d '{"registry_package": {"package_version": {"package_url": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"}}}'
